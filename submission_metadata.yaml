# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Antigravity (Gemini 3.1 Pro)"
  - "Claude"

ai_usage_summary: |
  Used an AI agent to help build the python pipeline architecture, implement the deterministic filtering rules (The Bouncer), set up sentence-transformers for local CPU execution, and generate the glassmorphism frontend dashboard. No candidate data was uploaded or processed via external APIs during the actual execution.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A lightning-fast Funnel Architecture combining deterministic rules with lightweight NLP. 
  1) The Bouncer: Drops ~89k irrelevant profiles via deterministic rules (penalizing non-engineers, honeypots, and IT-services lifers).
  2) The AI Brain: Uses a fast, local 'sentence-transformers' model to semantically score the remaining candidates against the specific JD requirements (Information Retrieval, Vector Search, etc).
  3) The Scorer: Applies heavy multiplier penalties to "LangChain Wrappers" and "Pure Researchers" while boosting profiles with ideal product company experience and good Redrob signals.
  Total execution time for 100k candidates on CPU is ~5 minutes.

